name: CI / Deploy

# Disparos:
# - push em main: lint + test + build + deploy + smoke
# - push em outras branches OU PRs: so lint + test + build (sem deploy)
#
# Padrao de publicacao Firebase:
# - secrets em nivel de repositorio, para funcionar sem billing/protection rules
#   de GitHub Environments em repos privados.
# - Autenticacao keyless via WIF/OIDC: o GitHub assina um token OIDC
#   (id-token: write, gratis em repo privado); o GCP troca por um access token
#   de curta duracao impersonando github-actions-deploy@mw-personal-trainer. A
#   action google-github-actions/auth@v2 exporta GOOGLE_APPLICATION_CREDENTIALS
#   (arquivo external_account). NAO usar FIREBASE_TOKEN/--token: revogado e com
#   prioridade sobre o GAC. Secret PT_DEPLOY_SA_B64 mantido so para rollback.
# - PT_FRONTEND_ENV: conteudo do .env.production.local (VITE_FIREBASE_*).
# - firebase-tools instalado local com override google-auth-library ^10 (o STS
#   exchange do WIF quebra com a 9.x bundled / gaxios 6; ver deploy job).

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**", "docs/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FIREBASE_TOOLS_VERSION: 15.22.3

jobs:
  # ─── Lint + test rodam em paralelo ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run

  # ─── Build depende dos dois e produz artefato dist/ ───────────────────────
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # .env.production.local e git-ignored e contem as credenciais publicas
      # do Firebase Web App (VITE_FIREBASE_API_KEY, AUTH_DOMAIN, etc).
      # Sem isso o bundle Vite sai sem firebaseConfig, hasFirebaseConfig fica
      # false e a UI esconde o login Google mesmo com o backend em Firebase.
      #
      # Secret PT_FRONTEND_ENV deve ser repo-level (Settings > Secrets >
      # Actions), igual aos demais secrets de deploy.
      - name: Recriar .env.production.local a partir do secret
        env:
          ENV_CONTENT: ${{ secrets.PT_FRONTEND_ENV }}
        run: |
          if [ -z "$ENV_CONTENT" ]; then
            echo "::error::Secret PT_FRONTEND_ENV nao configurado (Settings > Secrets > Actions). Sem isso o bundle sai sem firebaseConfig e o login Google some em producao."
            exit 1
          fi
          printf '%s' "$ENV_CONTENT" | tr -d '\r' > .env.production.local
          grep -q '^VITE_FIREBASE_API_KEY=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_API_KEY ausente no secret PT_FRONTEND_ENV"; exit 1)
          grep -q '^VITE_FIREBASE_AUTH_DOMAIN=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_AUTH_DOMAIN ausente no secret PT_FRONTEND_ENV"; exit 1)
          grep -q '^VITE_FIREBASE_PROJECT_ID=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_PROJECT_ID ausente no secret PT_FRONTEND_ENV"; exit 1)
          grep -q '^VITE_FIREBASE_APP_ID=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_APP_ID ausente no secret PT_FRONTEND_ENV"; exit 1)
          if grep -q '^VITE_FIREBASE_AUTH_EMULATOR_HOST=.\+' .env.production.local; then
            echo "::error::VITE_FIREBASE_AUTH_EMULATOR_HOST nao deve ter valor em prod. Remova do secret PT_FRONTEND_ENV."
            exit 1
          fi

      - run: npm run build

      # Sanity check pos-build: o smoke atual valida o backend, mas nao pega
      # frontend sem firebaseConfig. Este guard impede publicar login quebrado.
      - name: Validar bundle contem firebaseConfig
        run: |
          BUNDLE=$(ls dist/assets/index-*.js | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::Bundle dist/assets/index-*.js nao encontrado"
            exit 1
          fi
          if ! grep -q 'firebaseapp\.com' "$BUNDLE"; then
            echo "::error::Bundle $BUNDLE nao contem 'firebaseapp.com'. Build saiu sem firebaseConfig — VITE_FIREBASE_* nao foram aplicadas."
            exit 1
          fi
          echo "OK: bundle contem firebaseConfig"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ─── Deploy so roda em main ───────────────────────────────────────────────
  deploy:
    name: Deploy (mw-personal-trainer)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OBRIGATORIO p/ WIF/OIDC (gratis em repo privado). O bloco
                        # permissions SUBSTITUI o default: manter contents: read aqui.
    steps:
      - uses: actions/checkout@v4
      # Node 24 no deploy: o WIF obriga o firebase-tools a fazer token exchange em
      # sts.googleapis.com; Node 22.23.x tem regressao de rede ("Premature close").
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm ci --omit=dev

      # Autenticacao keyless (WIF/OIDC): troca o token OIDC do GitHub por um
      # access token de curta duracao impersonando a SA de deploy e exporta
      # GOOGLE_APPLICATION_CREDENTIALS (arquivo external_account). firebase-tools
      # cai no ramo autoAuth/ADC quando NAO ha --token nem FIREBASE_TOKEN.
      - id: auth
        name: Autenticacao Firebase (WIF/OIDC, keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: mw-personal-trainer
          workload_identity_provider: projects/327445337746/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deploy@mw-personal-trainer.iam.gserviceaccount.com
          token_format: 'access_token'        # tripwire: forca STS+impersonation aqui;
          access_token_lifetime: '900s'        # se o IAM/binding quebrar, falha NESTE step
          create_credentials_file: true
          export_environment_variables: true
      - name: Definir projeto Firebase
        run: echo "FIREBASE_PROJECT_ID=mw-personal-trainer" >> "$GITHUB_ENV"

      # firebase-tools LOCAL (nao npx) com override google-auth-library ^10: o
      # requireAuth->STS do WIF quebra com a 9.x bundled (gaxios 6, "Premature
      # close"). npx ignora "overrides", por isso install local real.
      - name: Instalar firebase-tools (override google-auth-library ^10 p/ STS WIF)
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/fbtools" && cd "$RUNNER_TEMP/fbtools"
          printf '%s' '{"name":"fbtools","private":true,"dependencies":{"firebase-tools":"'"$FIREBASE_TOOLS_VERSION"'"},"overrides":{"google-auth-library":"^10.9.0"}}' > package.json
          npm install --no-audit --no-fund
          GAL=$(node -e "console.log(require('$RUNNER_TEMP/fbtools/node_modules/google-auth-library/package.json').version)")
          echo "google-auth-library resolvida: $GAL"
          case "$GAL" in 10.*) : ;; *) echo "::error::Esperava google-auth-library 10.x, veio '$GAL' (override nao aplicou)"; exit 1 ;; esac
          echo "FIREBASE_BIN=$RUNNER_TEMP/fbtools/node_modules/.bin/firebase" >> "$GITHUB_ENV"
          "$RUNNER_TEMP/fbtools/node_modules/.bin/firebase" --version

      # IMPORTANTE: nenhum FIREBASE_TOKEN/--token aqui (vence o GAC e mascara a credencial WIF).
      - name: Deploy seletivo (functions do PT + hosting + firestore + storage)
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "::error::GOOGLE_APPLICATION_CREDENTIALS ausente (step de auth WIF falhou?)"
            exit 1
          fi
          deploy_status=1
          for attempt in 1 2 3 4 5; do
            set +e
            "$FIREBASE_BIN" deploy \
              --config firebase.json \
              --only "hosting,firestore,storage,functions:api,functions:claudeWorker" \
              --project="$FIREBASE_PROJECT_ID" \
              --non-interactive
            deploy_status=$?
            set -e
            if [ "$deploy_status" -eq 0 ]; then
              break
            fi
            echo "::warning::Firebase deploy falhou na tentativa ${attempt}/5; aguardando antes de repetir."
            sleep $((attempt * 10))
          done
          exit "$deploy_status"
      - name: Smoke test pos-deploy
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if curl -fsS https://api-ewylrqiwjq-rj.a.run.app/api/health | tee /tmp/health.json \
              && jq -e '.status=="ok" and .checks.firestore==true and .checks.gateway==true' /tmp/health.json; then
              exit 0
            fi
            echo "::warning::Smoke ainda nao verde (tentativa ${attempt}/12); aguardando propagacao das Functions..."
            sleep 5
          done
          cat /tmp/health.json || true
          exit 1

      - name: Smoke hosting pos-deploy
        run: |
          set -euo pipefail
          curl -fsS https://mw-personal-trainer.web.app/manifest.json \
            | jq -e '.id=="pt-coach" and .short_name=="PT Coach"'
          curl -fsS https://mw-personal-trainer.web.app/sw.js \
            | grep -vq '<!DOCTYPE html'
