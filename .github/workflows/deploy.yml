name: CI / Deploy

# Disparos:
# - push em main: lint + test + build + deploy + smoke
# - push em outras branches OU PRs: so lint + test + build (sem deploy)
#
# Padrao de publicacao Firebase:
# - secrets em nivel de repositorio, para funcionar sem billing/protection rules
#   de GitHub Environments em repos privados.
# - FIREBASE_TOKEN: refresh token do Firebase CLI, gerado pela sessao local
#   autorizada. Usado porque firebase-tools falha ADC/GOOGLE_APPLICATION_CREDENTIALS
#   em GitHub-hosted runners neste contexto.
# - PT_FRONTEND_ENV: conteudo do .env.production.local (VITE_FIREBASE_*).
# - Nao usa WIF/OIDC nem GitHub Environments.

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**", "docs/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FIREBASE_TOOLS_VERSION: 15.22.1

jobs:
  # ─── Lint + test rodam em paralelo ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run

  # ─── Build depende dos dois e produz artefato dist/ ───────────────────────
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # .env.production.local e git-ignored e contem as credenciais publicas
      # do Firebase Web App (VITE_FIREBASE_API_KEY, AUTH_DOMAIN, etc).
      # Sem isso o bundle Vite sai sem firebaseConfig, hasFirebaseConfig fica
      # false e a UI esconde o login Google mesmo com o backend em Firebase.
      #
      # Secret PT_FRONTEND_ENV deve ser repo-level (Settings > Secrets >
      # Actions), igual aos demais secrets de deploy.
      - name: Recriar .env.production.local a partir do secret
        env:
          ENV_CONTENT: ${{ secrets.PT_FRONTEND_ENV }}
        run: |
          if [ -z "$ENV_CONTENT" ]; then
            echo "::error::Secret PT_FRONTEND_ENV nao configurado (Settings > Secrets > Actions). Sem isso o bundle sai sem firebaseConfig e o login Google some em producao."
            exit 1
          fi
          printf '%s' "$ENV_CONTENT" | tr -d '\r' > .env.production.local
          grep -q '^VITE_FIREBASE_API_KEY=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_API_KEY ausente no secret PT_FRONTEND_ENV"; exit 1)
          grep -q '^VITE_FIREBASE_AUTH_DOMAIN=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_AUTH_DOMAIN ausente no secret PT_FRONTEND_ENV"; exit 1)
          grep -q '^VITE_FIREBASE_PROJECT_ID=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_PROJECT_ID ausente no secret PT_FRONTEND_ENV"; exit 1)
          grep -q '^VITE_FIREBASE_APP_ID=' .env.production.local \
            || (echo "::error::VITE_FIREBASE_APP_ID ausente no secret PT_FRONTEND_ENV"; exit 1)
          if grep -q '^VITE_FIREBASE_AUTH_EMULATOR_HOST=.\+' .env.production.local; then
            echo "::error::VITE_FIREBASE_AUTH_EMULATOR_HOST nao deve ter valor em prod. Remova do secret PT_FRONTEND_ENV."
            exit 1
          fi

      - run: npm run build

      # Sanity check pos-build: o smoke atual valida o backend, mas nao pega
      # frontend sem firebaseConfig. Este guard impede publicar login quebrado.
      - name: Validar bundle contem firebaseConfig
        run: |
          BUNDLE=$(ls dist/assets/index-*.js | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "::error::Bundle dist/assets/index-*.js nao encontrado"
            exit 1
          fi
          if ! grep -q 'firebaseapp\.com' "$BUNDLE"; then
            echo "::error::Bundle $BUNDLE nao contem 'firebaseapp.com'. Build saiu sem firebaseConfig — VITE_FIREBASE_* nao foram aplicadas."
            exit 1
          fi
          echo "OK: bundle contem firebaseConfig"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  # ─── Deploy so roda em main ───────────────────────────────────────────────
  deploy:
    name: Deploy (mw-personal-trainer)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm ci --omit=dev

      - name: Preparar autenticacao Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Secret FIREBASE_TOKEN nao configurado em Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "FIREBASE_PROJECT_ID=mw-personal-trainer" >> "$GITHUB_ENV"

      - name: Deploy seletivo (functions do PT + hosting + firestore + storage)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::Secret FIREBASE_TOKEN nao configurado"
            exit 1
          fi
          npx --yes --package firebase-tools@"$FIREBASE_TOOLS_VERSION" firebase --version
          deploy_status=1
          for attempt in 1 2 3 4 5; do
            set +e
            npx --yes --package firebase-tools@"$FIREBASE_TOOLS_VERSION" firebase deploy \
              --config firebase.json \
              --only "hosting,firestore,storage,functions:api,functions:claudeWorker" \
              --project="$FIREBASE_PROJECT_ID" \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
            deploy_status=$?
            set -e
            if [ "$deploy_status" -eq 0 ]; then
              break
            fi
            echo "::warning::Firebase deploy falhou na tentativa ${attempt}/5; aguardando antes de repetir."
            sleep $((attempt * 10))
          done
          exit "$deploy_status"
      - name: Smoke test pos-deploy
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if curl -fsS https://api-ewylrqiwjq-rj.a.run.app/api/health | tee /tmp/health.json \
              && jq -e '.status=="ok" and .checks.firestore==true and .checks.gateway==true' /tmp/health.json; then
              exit 0
            fi
            echo "::warning::Smoke ainda nao verde (tentativa ${attempt}/12); aguardando propagacao das Functions..."
            sleep 5
          done
          cat /tmp/health.json || true
          exit 1

      - name: Smoke hosting pos-deploy
        run: |
          set -euo pipefail
          curl -fsS https://mw-personal-trainer.web.app/manifest.json \
            | jq -e '.id=="pt-coach" and .short_name=="PT Coach"'
          curl -fsS https://mw-personal-trainer.web.app/sw.js \
            | grep -vq '<!DOCTYPE html'
