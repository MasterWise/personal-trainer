<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#B87850">
  <title>Personal Trainer — Coach</title>
  <link rel="manifest" href="%BASE_URL%manifest.json">
  <link rel="icon" href="%BASE_URL%icons/icon.svg" type="image/svg+xml">
  <!-- iOS Safari: necessário para "Adicionar à Tela de Início" funcionar como PWA standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PT Coach">
  <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Estrategia de atualizacao: o app SEMPRE busca versao nova quando online.
    // Camadas:
    //   1. SW registrado com updateViaCache:"none" -> sw.js nao fica preso em cache HTTP 24h
    //   2. registration.update() disparado em: load, focus, visibilitychange, online, e timer 5min
    //   3. Quando novo SW entra em estado "waiting" (instalado mas nao ativo), dispara
    //      pt:sw-updated imediatamente para o UpdateBanner aparecer sem precisar esperar
    //      a usuaria fechar todas as abas
    //   4. Quando o SW ativo broadcasta SW_UPDATED (em upgrade), tambem dispara pt:sw-updated
    //   5. firebase.json: index.html/manifest.json/sw.js com no-cache; /assets/** immutable
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        let registration;
        try {
          registration = await navigator.serviceWorker.register("%BASE_URL%sw.js", {
            scope: "%BASE_URL%",
            updateViaCache: "none",
          });
        } catch (err) {
          console.error("Service worker registration failed", err);
          return;
        }

        function notifyUpdateAvailable() {
          // Idempotente — UpdateBanner ignora eventos repetidos via useState
          window.dispatchEvent(new CustomEvent("pt:sw-updated"));
        }

        // Caso ja exista um SW "waiting" no momento do load (instalado por aba anterior),
        // notifica imediatamente para o banner aparecer.
        if (registration.waiting && navigator.serviceWorker.controller) {
          notifyUpdateAvailable();
        }

        // Quando o browser detecta um novo sw.js, dispara "updatefound" e o novo worker
        // entra em "installing". Quando ele completa o install e fica "waiting", notificamos.
        registration.addEventListener("updatefound", () => {
          const newWorker = registration.installing;
          if (!newWorker) return;
          newWorker.addEventListener("statechange", () => {
            if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
              notifyUpdateAvailable();
            }
          });
        });

        // O SW v5+ broadcasta SW_UPDATED em "activate" (apenas em upgrade real).
        // Cobre o caso em que skipWaiting/clients.claim acontecem sem passar pela
        // sequencia updatefound deste client (ex: aba foi aberta apos o install).
        navigator.serviceWorker.addEventListener("message", (ev) => {
          if (ev?.data?.type === "SW_UPDATED") {
            notifyUpdateAvailable();
          }
        });

        // Trigger de revalidacao: SEMPRE que online + ativo. Garante que aba aberta por
        // horas ou dias detecte versoes novas sem reload manual.
        function checkForUpdate() {
          if (!navigator.onLine) return;
          registration.update().catch(() => { /* network glitch; proxima checagem cobre */ });
        }

        // 1) Foco na janela (alt-tab volta, switch de app)
        window.addEventListener("focus", checkForUpdate);
        // 2) Aba volta a ficar visivel (mobile/desktop browser swipe)
        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) checkForUpdate();
        });
        // 3) Reconectou apos offline
        window.addEventListener("online", checkForUpdate);
        // 4) Polling de seguranca: aba ficou em foreground sem trocar de tab por horas
        setInterval(checkForUpdate, 5 * 60 * 1000); // 5 minutos
      });
    }
  </script>
</body>
</html>
